version: '3.9'
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=swipeclean;Username=postgres;Password=postgres
      Jwt__Issuer: SwipeClean
      Jwt__Audience: SwipeCleanMobile
      Jwt__SecretKey: CHANGE_ME_SUPER_LONG_32_CHAR_MIN_SECRET
      Smtp__Host: smtp.mailtrap.io
      Smtp__Port: 587
      Smtp__Username: ${SMTP_USERNAME}
      Smtp__Password: ${SMTP_PASSWORD}
      Smtp__FromEmail: no-reply@swipeclean.app
      Smtp__FromName: SwipeClean
      Smtp__UseStartTls: "true"
    depends_on:
      - postgres

  postgres:
    image: postgres:16
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: swipeclean
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data:
